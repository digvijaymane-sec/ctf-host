<!doctype html>

<script src="dsbridge.min.js"></script>

<pre id="out">Waiting...</pre>

<script>
const out = document.getElementById("out");

try {
    const bridge = window.dsBridge || window._dsbridge;
    out.textContent = "Bridge: " + typeof bridge + "\nCalling...";

    bridge.call("getUserAuth", {}, function(r) {
        out.textContent += "\n\nRaw response:\n" + JSON.stringify(r, null, 2);
    });

} catch(e) {
    out.textContent += "\n\nError:\n" + e;
}
</script>
