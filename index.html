<!doctype html>
<script src="dsbridge.min.js"></script>

<pre id="jwt" style="font:20px monospace;white-space:pre-wrap;word-break:break-all"></pre>

<script>
const bridge = window.dsBridge || window._dsbridge;

bridge.call("getUserAuth", {}, r => {
    if (typeof r === "string") r = JSON.parse(r);
    document.getElementById("jwt").textContent = r.data.authtoken;
});
</script>
